# Tareas del crew de chat (analista de datos). Convención CrewAI: config/tasks.yaml
# Ver https://docs.crewai.com/
responder_chat:
  description: >
    Contexto de sesión: {session_id}

    Historial reciente de la conversación (JSON, más antiguo primero en el arreglo si el sistema lo ordenó así;
    usalo solo como contexto): {conversation_history}

    Mensaje actual del usuario: {message}

    Instrucciones:
    - Herramientas disponibles (nombres exactos, las únicas para MySQL): schema_mysql_chocolart, consulta_mysql_analytics.
    - Si necesitás confirmar columnas o tipos, podés usar schema_mysql_chocolart cuando lo consideres útil (no es obligatorio en cada turno).
    - Si el usuario pide datos sobre ventas, stock, recetas, insumos, productos terminados o presupuesto de ventas en kilos,
      usá consulta_mysql_analytics con una única consulta SELECT válida solo sobre:
      insumos, recetas, productos_terminados, presupuesto_ventas_kilos o ventas.
    - Si el mensaje es un saludo, charla general, o no requiere consultar la base, no uses la herramienta y respondé de forma conversacional.
    - Si la pregunta es ambigua para SQL, pedí una aclaración breve (fechas, código de producto, cliente, etc.).
    - Respondé siempre en español.
  expected_output: >
    La respuesta final al usuario en texto claro (puede incluir listas o bullets). No incluyas JSON de salida.
  agent: analista_datos
