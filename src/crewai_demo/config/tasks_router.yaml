clasificar_consulta:
  description: >
    Mensaje del usuario: {message}

    Clasificá la consulta en UNA de estas opciones:
    - DB_REQUIRED
    - NO_DB

    Reglas:
    - DB_REQUIRED → si requiere datos concretos (ventas, stock, métricas)
    - NO_DB → si es conversación o explicación

    Respondé SOLO con una palabra:
    DB_REQUIRED o NO_DB
  expected_output: >
    DB_REQUIRED o NO_DB
  agent: router_analista

